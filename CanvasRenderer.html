<script>
const CanvasRenderer = (() => {
  function render(canvas, state, exportMode) {
    const format = state.format;
    const template = state.template;
    canvas.width = format.width;
    canvas.height = format.height;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawBackground(ctx, canvas, state);
    drawPhoto(ctx, canvas, state);
    drawOverlay(ctx, canvas, state);
    if (state.toggles.showDecorations) drawDecorations(ctx, canvas, state);
    drawText(ctx, canvas, state);
    if (state.toggles.showFrame) drawFrame(ctx, canvas, state);
    if (state.toggles.showTexture) drawGrain(ctx, canvas);
    return { ok: true };
  }

  function drawBackground(ctx, canvas, state) {
    const colors = state.colors;
    const template = state.template;
    if (template.BackgroundType === 'gradient' || (template.DecorationConfig || {}).style === 'gradient') {
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, colors.background);
      gradient.addColorStop(0.52, colors.accent);
      gradient.addColorStop(1, '#050505');
      ctx.fillStyle = gradient;
    } else {
      ctx.fillStyle = colors.background;
    }
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawPhoto(ctx, canvas, state) {
    if (!state.photo.image) return;
    const img = state.photo.image;
    const scale = Math.max(canvas.width / img.width, canvas.height / img.height) * state.photo.zoom;
    const width = img.width * scale;
    const height = img.height * scale;
    const x = (canvas.width - width) / 2 + state.photo.x * canvas.width * 0.28;
    const y = (canvas.height - height) / 2 + state.photo.y * canvas.height * 0.28;
    const blur = Math.max(0, Number(state.photo.blur || 0));
    const colorFilter = `brightness(${state.photo.brightness}) contrast(${state.photo.contrast}) saturate(${state.photo.saturation}) grayscale(${state.photo.grayscale ? 1 : 0})`;
    if (blur > 0 && needsIosBlurFallback()) {
      drawPhotoWithDownsampleBlur(ctx, canvas, img, x, y, width, height, blur, colorFilter);
      return;
    }
    ctx.save();
    ctx.filter = `${colorFilter} blur(${blur}px)`;
    ctx.drawImage(img, x, y, width, height);
    ctx.restore();
  }

  function needsIosBlurFallback() {
    const userAgent = navigator.userAgent || '';
    const iosDevice = /iPhone|iPad|iPod/i.test(userAgent);
    const ipadDesktopMode = /Macintosh/i.test(userAgent) && navigator.maxTouchPoints > 1;
    return iosDevice || ipadDesktopMode;
  }

  function drawPhotoWithDownsampleBlur(ctx, canvas, img, x, y, width, height, blur, colorFilter) {
    const scale = Math.max(0.42, 1 / (1 + blur * 0.12));
    const buffer = document.createElement('canvas');
    buffer.width = Math.max(1, Math.round(canvas.width * scale));
    buffer.height = Math.max(1, Math.round(canvas.height * scale));
    const bufferCtx = buffer.getContext('2d');
    bufferCtx.imageSmoothingEnabled = true;
    bufferCtx.imageSmoothingQuality = 'high';
    bufferCtx.filter = colorFilter;
    bufferCtx.drawImage(img, x * scale, y * scale, width * scale, height * scale);

    const intermediateScale = Math.sqrt(scale);
    const intermediate = document.createElement('canvas');
    intermediate.width = Math.max(buffer.width, Math.round(canvas.width * intermediateScale));
    intermediate.height = Math.max(buffer.height, Math.round(canvas.height * intermediateScale));
    const intermediateCtx = intermediate.getContext('2d');
    intermediateCtx.imageSmoothingEnabled = true;
    intermediateCtx.imageSmoothingQuality = 'high';
    intermediateCtx.drawImage(buffer, 0, 0, buffer.width, buffer.height, 0, 0, intermediate.width, intermediate.height);

    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(intermediate, 0, 0, intermediate.width, intermediate.height, 0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  function drawOverlay(ctx, canvas, state) {
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, hexToRgba(state.colors.overlay, Math.min(state.photo.overlayOpacity + 0.12, 0.85)));
    gradient.addColorStop(0.48, hexToRgba(state.colors.overlay, state.photo.overlayOpacity));
    gradient.addColorStop(1, hexToRgba('#000000', Math.min(state.photo.overlayOpacity + 0.28, 0.9)));
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawDecorations(ctx, canvas, state) {
    const style = (state.template.DecorationConfig || {}).style || 'frame';
    ctx.save();
    ctx.strokeStyle = state.colors.accent;
    ctx.fillStyle = state.colors.accent;
    ctx.globalAlpha = 0.9;
    if (style === 'diagonal' || style === 'neon') {
      ctx.lineWidth = 12;
      ctx.beginPath();
      ctx.moveTo(canvas.width - 280, 90);
      ctx.lineTo(canvas.width - 80, 90);
      ctx.lineTo(canvas.width - 80, 290);
      ctx.stroke();
    }
    if (style === 'bars' || style === 'list') {
      for (let i = 0; i < 5; i++) ctx.fillRect(88 + i * 54, 250, 36, 8);
    }
    if (style === 'grid' || style === 'info') {
      ctx.globalAlpha = 0.18;
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 90) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 90) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }
    if (style === 'executive-grid') {
      ctx.globalAlpha = 0.14;
      ctx.lineWidth = 2;
      for (let x = 88; x < canvas.width - 88; x += 112) {
        ctx.beginPath(); ctx.moveTo(x, 140); ctx.lineTo(x, canvas.height - 170); ctx.stroke();
      }
      ctx.globalAlpha = 0.9;
      ctx.fillRect(canvas.width - 320, 156, 232, 8);
      ctx.fillRect(canvas.width - 210, 178, 122, 8);
    }
    if (style === 'premium-split') {
      ctx.globalAlpha = 0.2;
      ctx.fillRect(canvas.width * 0.58, 0, canvas.width * 0.42, canvas.height);
      ctx.globalAlpha = 1;
      ctx.fillRect(canvas.width * 0.58, 0, 8, canvas.height);
      ctx.beginPath();
      ctx.arc(canvas.width - 150, 170, 82, 0, Math.PI * 2);
      ctx.stroke();
    }
    if (style === 'aurora') {
      const glow = ctx.createRadialGradient(canvas.width * 0.72, canvas.height * 0.18, 20, canvas.width * 0.72, canvas.height * 0.18, canvas.width * 0.58);
      glow.addColorStop(0, hexToRgba(state.colors.accent, 0.42));
      glow.addColorStop(1, hexToRgba(state.colors.accent, 0));
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    if (style === 'glass-panel') {
      ctx.globalAlpha = 0.16;
      ctx.fillStyle = '#FFFFFF';
      roundRect(ctx, 64, 118, canvas.width - 128, canvas.height - 240, 36);
      ctx.fill();
      ctx.globalAlpha = 0.7;
      ctx.strokeStyle = hexToRgba('#FFFFFF', 0.28);
      ctx.stroke();
    }
    if (style === 'focus-rings') {
      ctx.globalAlpha = 0.6;
      ctx.lineWidth = 4;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(canvas.width - 130, 180, 42 + i * 34, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    if (style === 'signal-lines') {
      ctx.globalAlpha = 0.28;
      ctx.lineWidth = 3;
      for (let i = 0; i < 7; i++) {
        ctx.beginPath();
        ctx.moveTo(88, 180 + i * 34);
        ctx.lineTo(canvas.width - 88 - i * 46, 180 + i * 34);
        ctx.stroke();
      }
    }
    if (style === 'merdeka-ribbon') {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(0, 0, canvas.width, Math.round(canvas.height * 0.28));
      ctx.fillStyle = '#B91C1C';
      ctx.fillRect(0, 0, canvas.width, Math.round(canvas.height * 0.14));
      ctx.fillStyle = hexToRgba('#FFFFFF', 0.18);
      for (let i = 0; i < 8; i++) {
        ctx.fillRect(-120 + i * 190, 0, 70, canvas.height);
      }
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(88, 250);
      ctx.lineTo(canvas.width - 88, 250);
      ctx.stroke();
      ctx.fillStyle = state.colors.accent;
    }
    if (style === 'red-white-modern') {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#DC2626';
      ctx.fillRect(0, 0, canvas.width, Math.round(canvas.height * 0.18));
      ctx.fillRect(0, canvas.height - Math.round(canvas.height * 0.16), canvas.width, Math.round(canvas.height * 0.16));
      ctx.globalAlpha = 0.1;
      ctx.fillStyle = '#DC2626';
      for (let i = 0; i < 10; i++) {
        ctx.beginPath();
        ctx.arc(canvas.width - 100 - i * 42, 210 + i * 18, 120 + i * 8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = state.colors.accent;
    }
    if (style === 'nusantara-bold') {
      const glow = ctx.createRadialGradient(canvas.width * 0.18, canvas.height * 0.12, 20, canvas.width * 0.18, canvas.height * 0.12, canvas.width * 0.72);
      glow.addColorStop(0, hexToRgba('#FACC15', 0.38));
      glow.addColorStop(1, hexToRgba('#FACC15', 0));
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.moveTo(72, 170);
      ctx.bezierCurveTo(canvas.width * 0.34, 80, canvas.width * 0.62, 260, canvas.width - 72, 150);
      ctx.stroke();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = '#FFFFFF';
      for (let i = 0; i < 18; i++) {
        ctx.fillRect(88 + i * 48, canvas.height - 240 + (i % 2) * 28, 24, 24);
      }
    }
    if (style === 'elegant-grid') {
      ctx.strokeStyle = '#172033';
      ctx.globalAlpha = 0.1;
      ctx.lineWidth = 2;
      const gridSize = Math.max(72, Math.round(canvas.width / 12));
      for (let x = 44; x < canvas.width - 44; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 44); ctx.lineTo(x, canvas.height - 44); ctx.stroke();
      }
      for (let y = 44; y < canvas.height - 44; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(44, y); ctx.lineTo(canvas.width - 44, y); ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = state.colors.accent;
      ctx.fillRect(44, 44, canvas.width - 88, 8);
      ctx.fillRect(canvas.width - 160, 52, 116, 116);
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#172033';
      ctx.fillRect(44, canvas.height * 0.58, canvas.width - 88, canvas.height * 0.26);
      ctx.globalAlpha = 1;
      ctx.fillStyle = state.colors.accent;
    }
    ctx.globalAlpha = 1;
    ctx.fillRect(88, Math.min(canvas.height - 180, 1040), 180, 10);
    ctx.restore();
  }

  function drawText(ctx, canvas, state) {
    const t = state.template;
    const c = state.content;
    const scaleY = canvas.height / 1350;
    const titlePos = scalePosition(t.TitlePosition, scaleY);
    const descPos = scalePosition(t.DescriptionPosition, scaleY);
    const labelPos = scalePosition(t.LabelPosition, scaleY);

    if (state.toggles.showLabel && c.label) drawPill(ctx, c.label, labelPos.x, labelPos.y, state.colors.accent);
    if (state.toggles.showSeries && c.series) drawSmallText(ctx, c.series, canvas.width - 88, labelPos.y + 20, state.colors.description, 'right');

    const titleResult = drawAutoText(ctx, c.title, {
      x: titlePos.x, y: titlePos.y, width: titlePos.width, maxLines: Number(t.MaxTitleLines || 3),
      maxSize: Number(t.TitleFontSize || 96), minSize: 48, lineHeight: 1.02,
      font: t.FontTitle || 'Oswald', weight: 700, color: state.colors.title, align: t.TextAlignment || 'left',
      uppercase: true
    });
    state.lastFitWarning = titleResult.overflow ? 'Judul terlalu panjang' : '';

    if (state.toggles.showDescription && c.description) {
      drawAutoText(ctx, c.description, {
        x: descPos.x, y: Math.max(descPos.y, titleResult.bottom + 36), width: descPos.width, maxLines: 4,
        maxSize: Number(t.DescriptionFontSize || 34), minSize: 22, lineHeight: 1.35,
        font: t.FontDescription || 'Inter', weight: 500, color: state.colors.description, align: 'left'
      });
    }

    if (state.toggles.showLogo) drawLogoMark(ctx, 88, canvas.height - 150, state.colors.accent);
    if (state.toggles.showUsername) drawSmallText(ctx, c.username, 156, canvas.height - 116, state.colors.description, 'left');
    if (state.toggles.showCta && c.cta) drawSmallText(ctx, c.cta, canvas.width - 88, canvas.height - 116, state.colors.title, 'right');
    if (state.toggles.showFooter) {
      ctx.fillStyle = state.colors.accent;
      ctx.fillRect(88, canvas.height - 72, canvas.width - 176, 2);
    }
  }

  function scalePosition(pos, scaleY) {
    return { x: Number(pos.x || 88), y: Number(pos.y || 470) * scaleY, width: Number(pos.width || 820), anchor: pos.anchor || 'left' };
  }

  function drawAutoText(ctx, text, options) {
    text = String(text || '');
    if (options.uppercase) text = text.toUpperCase();
    let size = options.maxSize;
    let lines = [];
    do {
      ctx.font = `${options.weight || 700} ${size}px ${options.font}, Arial, sans-serif`;
      lines = wrapText(ctx, text, options.width);
      if (lines.length <= options.maxLines) break;
      size -= 4;
    } while (size >= options.minSize);
    const visible = lines.slice(0, options.maxLines);
    const linePx = size * options.lineHeight;
    ctx.fillStyle = options.color;
    ctx.textAlign = options.align || 'left';
    ctx.textBaseline = 'top';
    ctx.font = `${options.weight || 700} ${size}px ${options.font}, Arial, sans-serif`;
    visible.forEach((line, index) => {
      const x = options.align === 'center' ? options.x + options.width / 2 : options.align === 'right' ? options.x + options.width : options.x;
      ctx.fillText(line, x, options.y + index * linePx);
    });
    return { bottom: options.y + visible.length * linePx, overflow: lines.length > options.maxLines };
  }

  function wrapText(ctx, text, width) {
    const words = text.split(/\s+/).filter(Boolean);
    const lines = [];
    let line = '';
    words.forEach((word) => {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > width && line) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    });
    if (line) lines.push(line);
    return lines.length ? lines : [''];
  }

  function drawPill(ctx, text, x, y, color) {
    ctx.font = '700 24px Inter, Arial, sans-serif';
    const width = ctx.measureText(text).width + 34;
    ctx.fillStyle = color;
    roundRect(ctx, x, y, width, 46, 23);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + 17, y + 24);
  }

  function drawSmallText(ctx, text, x, y, color, align) {
    ctx.font = '700 26px Inter, Arial, sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = align || 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(text || ''), x, y);
  }

  function drawLogoMark(ctx, x, y, color) {
    ctx.fillStyle = color;
    roundRect(ctx, x, y, 52, 52, 14);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '800 24px Inter, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('IG', x + 26, y + 27);
  }

  function drawFrame(ctx, canvas, state) {
    ctx.strokeStyle = state.colors.frame;
    ctx.lineWidth = 3;
    ctx.strokeRect(44, 44, canvas.width - 88, canvas.height - 88);
  }

  function drawGrain(ctx, canvas) {
    ctx.save();
    ctx.globalAlpha = 0.055;
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 900; i++) ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1.2, 1.2);
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function hexToRgba(hex, alpha) {
    const clean = String(hex || '#000000').replace('#', '');
    const full = clean.length === 3 ? clean.split('').map((c) => c + c).join('') : clean;
    const num = parseInt(full, 16);
    return `rgba(${(num >> 16) & 255},${(num >> 8) & 255},${num & 255},${alpha})`;
  }

  return { render };
})();
</script>
