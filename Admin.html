<div class="modal-backdrop" id="adminAuthModal">
  <div class="modal admin-auth-card" role="dialog" aria-modal="true" aria-labelledby="adminAuthTitle">
    <div class="modal-header">
      <h2 id="adminAuthTitle">Akses Admin</h2>
      <button class="icon-button" data-close-modal="adminAuthModal" type="button">Tutup</button>
    </div>
    <p class="helper-text">Masukkan token admin untuk membuka Template Manager.</p>
    <div class="field-row">
      <label for="adminTokenInput">Token admin</label>
      <input id="adminTokenInput" autocomplete="current-password" inputmode="text" placeholder="Tempel token admin" type="password">
    </div>
    <div class="button-row">
      <button class="primary-button" id="adminTokenSubmitBtn" type="button">Buka Template Manager</button>
      <button class="ghost-button" data-close-modal="adminAuthModal" type="button">Batal</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Template Manager</h2>
      <button class="icon-button" data-close-modal="adminModal" type="button">Tutup</button>
    </div>
    <div class="two-col">
      <div class="field-row"><label>Nama template</label><input id="adminTemplateName" type="text"></div>
      <div class="field-row"><label>Kategori</label><input id="adminCategory" type="text"></div>
    </div>
    <div class="color-grid">
      <label>Background<input id="adminBackground" type="color" value="#0f0f0f"></label>
      <label>Judul<input id="adminTitleColor" type="color" value="#f8f8f8"></label>
      <label>Deskripsi<input id="adminDescriptionColor" type="color" value="#d4d4d4"></label>
      <label>Accent<input id="adminAccent" type="color" value="#e53935"></label>
    </div>
    <div class="two-col">
      <div class="field-row"><label>Font judul</label><input id="adminFontTitle" type="text" value="Oswald"></div>
      <div class="field-row"><label>Ukuran judul</label><input id="adminTitleSize" type="number" value="92"></div>
    </div>
    <label class="check-row"><input id="adminIsActive" checked type="checkbox"> Template aktif</label>
    <div class="button-row">
      <button class="primary-button" id="adminSaveTemplateBtn" type="button">Simpan template</button>
      <button class="secondary-button" id="adminDuplicateTemplateBtn" type="button">Duplikat aktif</button>
      <button class="ghost-button" id="adminDeleteTemplateBtn" type="button">Hapus aktif</button>
    </div>
  </div>
</div>
