<style>
:root{--bg:#0f0f0f;--sidebar:#151515;--panel:#1b1b1b;--border:#2b2b2b;--text:#f8f8f8;--muted:#a3a3a3;--red:#e53935;--blue:#2563eb;--success:#22c55e;--warning:#f59e0b;--error:#ef4444}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Poppins,Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}
.app-shell{min-height:100vh;display:flex;flex-direction:column}.topbar{height:82px;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--border);background:#111}
.eyebrow{margin:0 0 4px;color:var(--muted);font-size:12px;text-transform:uppercase}.topbar h1{font-family:Oswald,Inter,sans-serif;margin:0;font-size:26px;letter-spacing:0}.topbar-actions{display:flex;gap:10px;align-items:center}
.studio-layout{flex:1;display:grid;grid-template-columns:420px 1fr;min-height:0}.control-panel{background:var(--sidebar);border-right:1px solid var(--border);overflow:auto}.preview-panel{min-width:0;display:flex;flex-direction:column;background:#0b0b0b}
.tabbar{position:sticky;top:0;z-index:2;display:flex;gap:6px;padding:12px;background:var(--sidebar);border-bottom:1px solid var(--border);overflow:auto}.tab-button{border:1px solid var(--border);background:#202020;color:var(--muted);border-radius:8px;padding:9px 10px;white-space:nowrap}.tab-button.active{background:var(--red);border-color:var(--red);color:#fff}
.tab-panel{display:none;padding:18px}.tab-panel.active{display:block}.field-row{display:flex;flex-direction:column;gap:7px;margin-bottom:15px}.field-row label{display:flex;justify-content:space-between;color:#d7d7d7;font-size:13px;font-weight:700}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:8px;background:#101010;color:var(--text);padding:11px 12px;outline:none}textarea{resize:vertical;line-height:1.5}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.18)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}.button-row,.topbar-actions{display:flex}.button-row{gap:10px}.button-stack{display:grid;gap:10px}.full{width:100%}
.primary-button,.secondary-button,.ghost-button,.icon-button{border-radius:8px;padding:11px 14px;border:1px solid transparent;color:#fff;font-weight:800}.primary-button{background:var(--red)}.secondary-button{background:#242424;border-color:#363636}.ghost-button,.icon-button{background:transparent;border-color:var(--border);color:#ddd}
.template-grid{display:grid;gap:10px}.template-card{border:1px solid var(--border);background:#202020;border-radius:8px;padding:12px;text-align:left;color:#fff}.template-card.active{border-color:var(--red);box-shadow:0 0 0 3px rgba(229,57,53,.16)}.template-card small{display:block;color:var(--muted);margin-top:4px}
.upload-box{border:1px dashed #444;border-radius:8px;padding:16px;margin-bottom:16px;background:#101010}.upload-box p{margin:10px 0 0;color:var(--muted);font-size:13px}.check-row,.toggle-grid label,.color-grid label{display:flex;align-items:center;gap:8px;color:#ddd;font-size:13px}.check-row input,.toggle-grid input{width:auto}.toggle-grid,.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.color-grid input{height:42px;padding:4px}
.canvas-toolbar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);background:#111}.canvas-toolbar span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.status-pill{border:1px solid var(--border);border-radius:999px;padding:6px 10px;color:#ddd;background:#181818}
.canvas-stage{flex:1;display:grid;place-items:center;padding:24px;overflow:auto}canvas{display:block;max-width:min(76vw,720px);max-height:calc(100vh - 180px);width:auto;height:auto;background:#111;box-shadow:0 24px 70px rgba(0,0,0,.45)}
.toast-host{position:fixed;right:18px;bottom:18px;display:grid;gap:10px;z-index:30}.toast{background:#1b1b1b;border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:8px;padding:12px 14px;min-width:260px;box-shadow:0 16px 50px rgba(0,0,0,.45)}.toast.error{border-left-color:var(--error)}.toast.success{border-left-color:var(--success)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;place-items:center;z-index:20;padding:18px}.modal-backdrop.active{display:grid}.modal{width:min(980px,100%);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px}.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.modal-header h2{margin:0;font-size:22px}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}.history-card{background:#151515;border:1px solid var(--border);border-radius:8px;padding:12px}.history-card h3{margin:0 0 6px;font-size:16px}.history-card p{margin:0 0 10px;color:var(--muted);font-size:13px}.field-warning{min-height:18px;margin:0;color:var(--warning);font-size:12px}.helper-text{color:var(--muted);line-height:1.6;margin:0 0 14px}.download-preview{display:block;width:100%;max-height:62vh;object-fit:contain;background:#080808;border:1px solid var(--border);border-radius:8px;margin-bottom:14px}
@media (max-width:960px){.topbar{height:auto;align-items:flex-start;gap:12px}.studio-layout{grid-template-columns:1fr}.preview-panel{order:-1;min-height:52vh}.control-panel{border-right:0;border-top:1px solid var(--border)}canvas{max-width:92vw;max-height:48vh}.two-col,.toggle-grid,.color-grid{grid-template-columns:1fr}.topbar-actions{flex-wrap:wrap;justify-content:flex-end}}
</style>
