<style>
:root{
  --bg:#090a0d;--surface:#111318;--surface-2:#171a21;--surface-3:#1e222b;
  --border:#292e39;--border-soft:#20242d;--text:#f7f7f8;--muted:#969eae;
  --accent:#f04444;--accent-strong:#d92d3a;--blue:#4f7cff;--success:#32d583;
  --warning:#fdb022;--error:#f97066;--radius:14px;--radius-sm:10px;
  --shadow:0 24px 70px rgba(0,0,0,.42);--topbar:76px
}
*{box-sizing:border-box}
html{background:var(--bg);color-scheme:dark;scroll-behavior:smooth}
body{margin:0;background:radial-gradient(circle at 75% -10%,rgba(79,124,255,.09),transparent 32%),var(--bg);color:var(--text);font-family:Inter,Poppins,Arial,sans-serif;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
button:disabled{cursor:not-allowed;opacity:.5}
button,input,select,textarea{transition:border-color .18s ease,background .18s ease,box-shadow .18s ease,transform .18s ease}
:focus-visible{outline:3px solid rgba(79,124,255,.42);outline-offset:2px}

.app-shell{min-height:100dvh;display:flex;flex-direction:column}
.topbar{height:var(--topbar);flex:none;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 24px;border-bottom:1px solid var(--border-soft);background:rgba(12,13,17,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);position:relative;z-index:10}
.eyebrow{margin:0 0 3px;color:var(--accent);font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.topbar h1{font-family:Oswald,Inter,sans-serif;margin:0;font-size:25px;line-height:1.15;letter-spacing:-.02em}
.topbar-actions{display:flex;gap:8px;align-items:center}

.studio-layout{flex:1;display:grid;grid-template-columns:minmax(360px,420px) minmax(0,1fr);height:calc(100dvh - var(--topbar));min-height:0}
.control-panel{background:rgba(17,19,24,.96);border-right:1px solid var(--border-soft);overflow:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:#343a47 transparent}
.preview-panel{min-width:0;min-height:0;display:flex;flex-direction:column;background:radial-gradient(circle at 50% 38%,#171b23 0,#0c0e12 58%,#090a0d 100%)}

.tabbar{position:sticky;top:0;z-index:5;display:flex;gap:4px;padding:10px 12px;background:rgba(17,19,24,.94);border-bottom:1px solid var(--border-soft);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);overflow-x:auto;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab-button{min-height:38px;flex:1;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:9px;padding:8px 10px;font-size:12px;font-weight:750;white-space:nowrap}
.tab-button:hover{color:var(--text);background:var(--surface-3)}
.tab-button.active{background:linear-gradient(135deg,var(--accent),var(--accent-strong));color:#fff;box-shadow:0 7px 20px rgba(217,45,58,.24)}

.tab-panel{display:none;padding:20px 18px 28px;animation:panel-in .2s ease}
.tab-panel.active{display:block}
@keyframes panel-in{from{opacity:.3;transform:translateY(4px)}to{opacity:1;transform:none}}
.field-row{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.field-row label{display:flex;justify-content:space-between;gap:12px;color:#d7dae1;font-size:12px;font-weight:750;letter-spacing:.01em}
input,select,textarea{width:100%;min-height:44px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#0d0f14;color:var(--text);padding:10px 12px;outline:none}
input::placeholder,textarea::placeholder{color:#606979}
textarea{resize:vertical;line-height:1.55;min-height:86px}
input:hover,select:hover,textarea:hover{border-color:#3a4250}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,124,255,.14);background:#10131a}
select{appearance:none;background-image:linear-gradient(45deg,transparent 50%,#8b94a5 50%),linear-gradient(135deg,#8b94a5 50%,transparent 50%);background-position:calc(100% - 17px) 19px,calc(100% - 12px) 19px;background-size:5px 5px;background-repeat:no-repeat;padding-right:34px}
input[type="range"]{appearance:none;height:42px;border:0;background:transparent;padding:0}
input[type="range"]::-webkit-slider-runnable-track{height:5px;border-radius:999px;background:#303643}
input[type="range"]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;margin-top:-7px;border-radius:50%;background:#fff;border:5px solid var(--accent);box-shadow:0 3px 10px rgba(0,0,0,.3)}
input[type="range"]::-moz-range-track{height:5px;border-radius:999px;background:#303643}
input[type="range"]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:5px solid var(--accent)}
input[type="checkbox"]{accent-color:var(--accent)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.button-row,.topbar-actions{display:flex}.button-row{gap:9px;flex-wrap:wrap}.button-stack{display:grid;gap:10px}.full{width:100%}
.primary-button,.secondary-button,.ghost-button,.icon-button{min-height:44px;border-radius:var(--radius-sm);padding:10px 15px;border:1px solid transparent;color:#fff;font-size:13px;font-weight:800;line-height:1}
.primary-button{background:linear-gradient(135deg,var(--accent),var(--accent-strong));box-shadow:0 8px 22px rgba(217,45,58,.2)}
.primary-button:hover{transform:translateY(-1px);box-shadow:0 11px 28px rgba(217,45,58,.28)}
.secondary-button{background:var(--surface-3);border-color:#343a47}.secondary-button:hover{background:#282d37;border-color:#454d5d}
.ghost-button,.icon-button{background:transparent;border-color:var(--border);color:#d5d9e1}.ghost-button:hover,.icon-button:hover{background:var(--surface-2);color:#fff}

.template-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.template-card{min-height:78px;border:1px solid var(--border);background:linear-gradient(145deg,#1b1e26,#14171d);border-radius:12px;padding:13px;text-align:left;color:#fff;position:relative;overflow:hidden}
.template-card::after{content:"";position:absolute;width:52px;height:52px;right:-22px;bottom:-22px;border:1px solid rgba(255,255,255,.08);border-radius:50%}
.template-card:hover{transform:translateY(-2px);border-color:#444c5b}
.template-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,68,68,.13),0 12px 24px rgba(0,0,0,.18)}
.template-card strong{display:block;font-size:13px;line-height:1.3}.template-card small{display:block;color:var(--muted);font-size:10px;margin-top:5px;line-height:1.3}
.upload-box{border:1px dashed #454d5c;border-radius:var(--radius);padding:18px;margin-bottom:18px;background:linear-gradient(145deg,rgba(79,124,255,.06),rgba(240,68,68,.03))}
.upload-box input{background:var(--surface);border-style:dashed}.upload-box p{margin:10px 0 0;color:var(--muted);font-size:11px;line-height:1.5}
.check-row,.toggle-grid label,.color-grid label{display:flex;align-items:center;gap:9px;color:#d5d9e1;font-size:12px;font-weight:650}
.check-row{min-height:44px;margin-bottom:12px}.check-row input,.toggle-grid input{width:17px;height:17px;min-height:auto}
.toggle-grid,.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.toggle-grid label,.color-grid label{min-height:46px;padding:9px 10px;border:1px solid var(--border-soft);border-radius:10px;background:#13161c}
.color-grid label{justify-content:space-between}.color-grid input{width:42px;min-height:30px;height:30px;padding:2px;border-radius:8px}

.canvas-toolbar{height:58px;flex:none;display:flex;align-items:center;justify-content:space-between;gap:15px;padding:0 20px;border-bottom:1px solid var(--border-soft);background:rgba(13,15,19,.78);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.canvas-toolbar strong{font-size:13px}.canvas-toolbar span{display:block;color:var(--muted);font-size:10px;margin-top:3px}
.status-pill{border:1px solid #344054;border-radius:999px;padding:6px 10px!important;color:#cfd4dc!important;background:#151922;font-weight:700}
.canvas-stage{flex:1;min-height:0;display:grid;place-items:center;padding:26px;overflow:auto;overscroll-behavior:contain}
canvas{display:block;max-width:min(70vw,720px);max-height:calc(100dvh - 180px);width:auto;height:auto;background:#111;border-radius:3px;box-shadow:0 32px 90px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06)}

.toast-host{position:fixed;right:18px;bottom:max(18px,env(safe-area-inset-bottom));display:grid;gap:9px;z-index:30}
.toast{background:rgba(23,26,33,.96);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:12px;padding:13px 15px;min-width:260px;max-width:min(380px,calc(100vw - 36px));box-shadow:var(--shadow);backdrop-filter:blur(16px)}
.toast.error{border-left-color:var(--error)}.toast.success{border-left-color:var(--success)}
.modal-backdrop{position:fixed;inset:0;background:rgba(4,5,7,.78);display:none;place-items:center;z-index:20;padding:20px;backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
.modal-backdrop.active{display:grid}.modal{width:min(900px,100%);max-height:min(88dvh,900px);overflow:auto;background:linear-gradient(145deg,#1a1d24,#12151b);border:1px solid #303642;border-radius:18px;padding:20px;box-shadow:var(--shadow)}
.modal-header{position:sticky;top:-20px;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;margin:-20px -20px 18px;padding:18px 20px 14px;background:rgba(24,27,34,.94);border-bottom:1px solid var(--border-soft);backdrop-filter:blur(14px)}
.modal-header h2{margin:0;font-size:20px;letter-spacing:-.02em}
.history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:16px}.history-card{background:#11141a;border:1px solid var(--border);border-radius:12px;padding:14px}.history-card h3{margin:0 0 6px;font-size:14px}.history-card p{margin:0 0 12px;color:var(--muted);font-size:11px;line-height:1.5}
.field-warning{min-height:18px;margin:0;color:var(--warning);font-size:11px}.helper-text{color:var(--muted);line-height:1.6;margin:0 0 14px;font-size:12px}.download-preview{display:block;width:100%;max-height:62dvh;object-fit:contain;background:#08090b;border:1px solid var(--border);border-radius:12px;margin-bottom:14px}

@media (max-width:1100px){.studio-layout{grid-template-columns:360px minmax(0,1fr)}.tab-panel{padding-inline:14px}.template-grid{grid-template-columns:1fr}}
@media (max-width:800px){
  :root{--topbar:66px}
  .topbar{position:sticky;top:0;padding:10px 12px;gap:10px}.eyebrow{display:none}.topbar h1{font-size:20px}.topbar-actions{gap:5px}.topbar-actions .icon-button{min-height:40px;padding:8px 9px;font-size:10px}.topbar-actions .primary-button{min-height:40px;padding-inline:11px;font-size:10px}
  .studio-layout{display:flex;flex-direction:column;height:auto;min-height:calc(100dvh - var(--topbar))}.preview-panel{order:-1;min-height:46dvh;height:46dvh}.control-panel{border-right:0;border-top:1px solid var(--border-soft);overflow:visible}
  .canvas-toolbar{height:50px;padding-inline:14px}.canvas-stage{padding:12px}.canvas-stage canvas{max-width:94vw;max-height:calc(46dvh - 70px)}
  .tabbar{top:var(--topbar);padding:8px;gap:3px}.tab-button{min-width:70px;min-height:40px;font-size:11px}.tab-panel{padding:18px 14px 28px}.template-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .modal-backdrop{align-items:end;padding:0}.modal{width:100%;max-height:90dvh;border-radius:20px 20px 0 0;border-bottom:0;padding:18px 14px max(18px,env(safe-area-inset-bottom))}.modal-header{top:-18px;margin:-18px -14px 16px;padding:16px 14px 12px;border-radius:20px 20px 0 0}
  .toast-host{left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom))}.toast{min-width:0;width:100%}
}
@media (max-width:480px){.two-col{grid-template-columns:1fr}.toggle-grid,.color-grid{grid-template-columns:1fr 1fr}.button-row>*{flex:1}.topbar h1{font-size:17px}.topbar-actions .primary-button{max-width:105px}.history-grid{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
</style>
